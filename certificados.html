<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio</title>
    <link rel="stylesheet" href="./Styles/certificados.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
</head>
<body>
    <header class="cabecalho">
        <nav class="cabecalho__menu">
            <a class="cabecalho_menu_link" href="./index.html">Home</a>
            <a class="cabecalho_menu_link" href="./about.html">Sobre</a>
            <a class="cabecalho_menu_link" href="./certificados.html">Certificados</a>
        </nav>
    </header>

    <main id="myCarousel">
        <div class="certificados-container">
            <img class="certificados" src="./Certificados/01.jpeg" alt="">
            <img class="certificados" src="./Certificados/02.jpeg" alt="">
            <img class="certificados" src="./Certificados/03.jpeg" alt="">
            <img class="certificados" src="./Certificados/04.jpeg" alt="">
            <img class="certificados" src="./Certificados/05.jpeg" alt="">
            <img class="certificados" src="./Certificados/06.jpeg" alt="">
            <img class="certificados" src="./Certificados/07.jpeg" alt="">
            <img class="certificados" src="./Certificados/08.jpeg" alt="">
        </div>
        
        <ol class="carousel-indicators">
            <li data-target="#myCarousel" data-slide-to="0"></li>
            <li data-target="#myCarousel" data-slide-to="1"></li>
            <li data-target="#myCarousel" data-slide-to="2"></li>
            <li data-target="#myCarousel" data-slide-to="3"></li>
            <li data-target="#myCarousel" data-slide-to="4"></li>
            <li data-target="#myCarousel" data-slide-to="5"></li>
            <li data-target="#myCarousel" data-slide-to="6"></li>
            <li data-target="#myCarousel" data-slide-to="7"></li>
        </ol>
    </main>

    <footer class="rodape">
        <p>Desenvolvido por Arthur Zanon.</p>
    </footer>

    <script>
            $(document).ready(function(){
        console.log("Slick Carousel inicializado!");
        $('.certificados-container').slick({
            slidesToShow: 1,
            slidesToScroll: 1,
            arrows: true,
            dots: true,
            autoplay: true,
            autoplaySpeed: 3000,
            responsive: [
            {
                breakpoint: 800,
                settings: {
                slidesToShow: 1,
                slidesToScroll: 1
                }
            }
            ]
        });

        // Add event listener for slide change
        $('.certificados-container').on('beforeChange', function(event, slick, currentSlide, nextSlide){
            // Remove active class from all li elements
            $('.carousel-indicators li').removeClass('active');

            // Add active class to the li element corresponding to the current slide
            $('.carousel-indicators li:eq(' + currentSlide + ')').addClass('active');
        });
        });
      </script>
</body>
</html>
